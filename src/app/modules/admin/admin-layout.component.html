<div class="admin-shell theme-admin" [class.is-dark]="isDarkMode" [class.is-sidebar-open]="isSidebarOpen">
  <div
    class="admin-sidebar-backdrop"
    *ngIf="isSidebarOpen"
    (click)="closeSidebar()"
    aria-hidden="true"
  ></div>

  <aside class="admin-sidebar" [class.is-open]="isSidebarOpen">
    <div class="admin-brand">
      <a
        routerLink="/home"
        class="admin-brand-link"
        [attr.aria-label]="'ADMIN.LAYOUT.HOME_LINK' | translate"
        (click)="closeSidebar()"
      >
        <img
          class="admin-brand-logo"
          src="images/logo.svg"
          [attr.alt]="'ADMIN.LAYOUT.BRAND' | translate"
        />
      </a>
    </div>

    <nav class="admin-nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="admin-nav-link"
        (click)="closeSidebar()"
      >
        <span class="material-symbols-outlined">{{ item.icon }}</span>
        <span>{{ item.labelKey | translate }}</span>
      </a>
    </nav>

    <div class="admin-sidebar-footer">
      <button class="admin-nav-link admin-nav-btn" type="button">
        <span class="material-symbols-outlined">help_outline</span>
        <span>{{ 'ADMIN.LAYOUT.SUPPORT' | translate }}</span>
      </button>
      <button class="admin-nav-link admin-nav-btn" type="button" (click)="onLogout()">
        <span class="material-symbols-outlined">logout</span>
        <span>{{ 'ADMIN.LAYOUT.SIGN_OUT' | translate }}</span>
      </button>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <button
        type="button"
        class="admin-icon-btn admin-menu-toggle"
        (click)="toggleSidebar()"
        [attr.aria-expanded]="isSidebarOpen"
        [attr.aria-label]="(isSidebarOpen ? 'ADMIN.LAYOUT.CLOSE_MENU' : 'ADMIN.LAYOUT.OPEN_MENU') | translate"
      >
        <span class="material-symbols-outlined">{{ isSidebarOpen ? 'close' : 'menu' }}</span>
      </button>

      <div class="admin-title-block">
        <h2>{{ pageTitleKey | translate }}</h2>
        <p>{{ pageSubtitleKey | translate }}</p>
      </div>

      <div class="admin-topbar-actions">
        <button
          type="button"
          class="admin-icon-btn"
          (click)="toggleTheme()"
          [attr.aria-pressed]="isDarkMode"
          [attr.aria-label]="'ADMIN.LAYOUT.THEME_TOGGLE' | translate"
        >
          <span class="material-symbols-outlined">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
        </button>

        <div class="admin-lang-switch" role="group" [attr.aria-label]="'ADMIN.LAYOUT.SUBTITLE' | translate">
          <button
            type="button"
            class="admin-lang-btn"
            [class.active]="currentLanguage === 'th'"
            [attr.aria-pressed]="currentLanguage === 'th'"
            [attr.aria-label]="'ADMIN.LAYOUT.LANGUAGE_TH' | translate"
            (click)="switchLanguage('th')"
          >
            TH
          </button>
          <button
            type="button"
            class="admin-lang-btn"
            [class.active]="currentLanguage === 'en'"
            [attr.aria-pressed]="currentLanguage === 'en'"
            [attr.aria-label]="'ADMIN.LAYOUT.LANGUAGE_EN' | translate"
            (click)="switchLanguage('en')"
          >
            EN
          </button>
        </div>

        <div class="admin-profile">
          <button
            class="admin-avatar"
            type="button"
            (click)="toggleProfileMenu()"
            [attr.aria-expanded]="isProfileMenuOpen"
            aria-haspopup="menu"
            [attr.aria-label]="'ADMIN.LAYOUT.PROFILE_MENU' | translate"
          >
            {{ userInitials }}
          </button>
          <div class="admin-profile-menu" *ngIf="isProfileMenuOpen" role="menu">
            <a
              *ngIf="isStaffUser"
              class="admin-profile-item"
              role="menuitem"
              [routerLink]="'/staff'"
              (click)="closeProfileMenu()"
            >
              <span class="material-symbols-outlined">badge</span>
              <span>{{ 'ADMIN.LAYOUT.STAFF_AREA' | translate }}</span>
            </a>
            <button type="button" class="admin-profile-item" role="menuitem" (click)="onLogout()">
              <span class="material-symbols-outlined">logout</span>
              <span>{{ 'ADMIN.LAYOUT.SIGN_OUT' | translate }}</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
