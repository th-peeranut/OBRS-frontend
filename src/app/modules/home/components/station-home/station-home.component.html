<div class="station-bg">
  <div class="map-section">
    <div class="map-logo">
      <div class="station-section">
        <div class="station-section-header">
          {{ "HOME.STATION.HEADER" | translate }}
        </div>

        <ng-container *ngIf="stationList$ | async as stations">
          <div class="route-switch-wrap" *ngIf="stations.length > 0">
            <div class="route-switch">
              <button
                type="button"
                class="route-chip"
                [class.active]="currentDirection === 'forward'"
                (click)="onDirectionClick('forward')"
              >
                {{ getRouteTitle(stations, false) }}
              </button>
              <button
                type="button"
                class="route-chip"
                [class.active]="currentDirection === 'reverse'"
                (click)="onDirectionClick('reverse')"
              >
                {{ getRouteTitle(stations, true) }}
              </button>
            </div>
          </div>

          <div class="station-map-card">
            <div class="timeline" *ngIf="getDisplayedStations(stations) as orderedStations">
              <div
                class="timeline-row"
                *ngFor="let station of orderedStations; let i = index"
              >
                <div class="side side-left">
                  <button
                    type="button"
                    class="station-pill"
                    *ngIf="isLeft(i)"
                    (click)="navMap(station.url)"
                  >
                    {{ getStationName(station) }}
                  </button>
                </div>

                <div class="axis-cell">
                  <span
                    class="connector connector-left"
                    *ngIf="isLeft(i)"
                  ></span>
                  <span
                    class="connector connector-right"
                    *ngIf="!isLeft(i)"
                  ></span>
                  <span
                    class="axis-node"
                    [class.axis-node-end]="isEndPoint(i, orderedStations.length)"
                  ></span>
                </div>

                <div class="side side-right">
                  <button
                    type="button"
                    class="station-pill"
                    *ngIf="!isLeft(i)"
                    (click)="navMap(station.url)"
                  >
                    {{ getStationName(station) }}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>
