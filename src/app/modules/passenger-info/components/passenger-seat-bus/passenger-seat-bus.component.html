  <div class="seat-row">

    <app-passenger-seat-box

      [isDisabled]="isSeatTakenByOther('B1') && !isSeatActive('B1')"
      (passengerSeatOutput)="setPassengerSeatPosition($event)"
    >
    </app-passenger-seat-box>

    <!-- EMPTY -->
    <div class="empty-box"></div>
