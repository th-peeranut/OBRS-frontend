<div class="card-container">

  <div class="seat-row">
    <!-- SEAT -->
    <app-passenger-seat-box
      [label]="'A1'"
      [gender]="seatGenderFor('A1')"
      [isDisabled]="isSeatDisabled('A1') && !isSeatActive('A1')"
      (passengerSeatOutput)="setPassengerSeatPosition($event)"
    >
    </app-passenger-seat-box>

    <!-- EMPTY -->
    <div class="empty-box"></div>

    <!-- EMPTY -->
    <div class="empty-box"></div>

    <!-- DRIVER -->
    <div class="driver-box">
      <img src="images/passenger-driver.png" alt="Passenger Driver Image" />

  </div>
