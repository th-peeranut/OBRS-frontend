<div class="d-flex min-vh-100 flex-column">
  <!-- Top Navbar -->
  <nav class="navbar navbar-expand-lg bg-primary navbar-dark px-3 py-2 shadow-sm">
    <a class="navbar-brand fw-bold" routerLink="/staff">
      {{ 'STAFF.LAYOUT.BRAND' | translate }}
    </a>
    <button class="navbar-toggler ms-auto" type="button" (click)="toggleSidebar()"
            [attr.aria-label]="'STAFF.LAYOUT.OPEN_MENU' | translate">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item">
          <a class="nav-link text-white d-flex align-items-center gap-1"
             routerLink="/home"
             [attr.aria-label]="'STAFF.LAYOUT.HOME_LINK' | translate"
             (click)="isSidebarOpen = false">
            <span class="material-icons" style="font-size:18px">home</span>
            <span>{{ 'STAFF.LAYOUT.HOME_LINK' | translate }}</span>
          </a>
        </li>
        <li class="nav-item">
          <span class="navbar-text text-white me-2 fw-semibold">{{ userInitials }}</span>
        </li>
        <li class="nav-item">
          <button class="btn btn-sm btn-outline-light" (click)="onLogout()">
            {{ 'STAFF.LAYOUT.SIGN_OUT' | translate }}
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <div class="d-flex flex-grow-1">
    <!-- Sidebar -->
    <aside class="bg-light border-end d-flex flex-column"
           [style.width]="'220px'"
           [style.min-width]="'220px'"
           [class.d-none]="!isSidebarOpen"
           [class.d-lg-flex]="true">
      <nav class="py-3 px-2 flex-grow-1">
        <ul class="nav flex-column gap-1">
          <li class="nav-item" *ngFor="let item of navItems">
            <a class="nav-link d-flex align-items-center gap-2 rounded px-3"
               [routerLink]="['/staff', item.path]"
               routerLinkActive="active bg-primary text-white"
               [routerLinkActiveOptions]="{ exact: false }"
               (click)="isSidebarOpen = false">
              <span class="material-icons" style="font-size:18px">{{ item.icon }}</span>
              {{ item.labelKey | translate }}
            </a>
          </li>
        </ul>
      </nav>
      <div class="p-3 border-top">
        <div class="d-flex gap-2">
          <button class="btn btn-sm" [class.btn-primary]="currentLanguage === 'th'" [class.btn-outline-secondary]="currentLanguage !== 'th'" (click)="switchLanguage('th')">TH</button>
          <button class="btn btn-sm" [class.btn-primary]="currentLanguage === 'en'" [class.btn-outline-secondary]="currentLanguage !== 'en'" (click)="switchLanguage('en')">EN</button>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-grow-1 overflow-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
