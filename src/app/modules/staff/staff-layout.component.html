<div class="admin-shell theme-staff" [class.is-dark]="isDarkMode" [class.is-sidebar-open]="isSidebarOpen" [class.is-sidebar-pinned]="isSidebarPinned">
  <div
    class="admin-sidebar-backdrop"
    *ngIf="isSidebarOpen"
    (click)="closeSidebar()"
    aria-hidden="true"
  ></div>

  <aside
    class="admin-sidebar"
    [class.is-open]="isSidebarOpen"
  >
    <div class="admin-sidebar-panel">
      <div class="admin-brand">
        <a
          routerLink="/"
          class="admin-brand-link"
          [attr.aria-label]="'STAFF.LAYOUT.HOME_LINK' | translate"
          (click)="closeSidebar()"
        >
          <img
            class="admin-brand-logo"
            src="images/logo.svg"
            [attr.alt]="'STAFF.LAYOUT.BRAND' | translate"
          />
        </a>
      </div>

      <!-- TOGGLE BUTTON — collapses the expanded 280px column to a 76px icon
           rail (or vice-versa) on explicit click. Always visible in both states.
           align-self: controlled by CSS (centred in rail, right-aligned in expanded). -->
      <button
        type="button"
        class="admin-sidebar-pin"
        (click)="togglePin()"
        [attr.aria-expanded]="isSidebarPinned"
        [attr.aria-label]="(isSidebarPinned ? 'STAFF.LAYOUT.COLLAPSE_MENU' : 'STAFF.LAYOUT.EXPAND_MENU') | translate"
        [attr.title]="(isSidebarPinned ? 'STAFF.LAYOUT.COLLAPSE_MENU' : 'STAFF.LAYOUT.EXPAND_MENU') | translate"
      >
        <span class="material-symbols-outlined">{{ toggleIconName }}</span>
      </button>

      <nav class="admin-nav">
        <a
          *ngFor="let item of navItems; trackBy: trackNavItem"
          [routerLink]="['/staff', item.path]"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
          class="admin-nav-link"
          (click)="onNavLinkClick()"
        >
          <span class="material-symbols-outlined">{{ item.icon }}</span>
          <span>{{ item.labelKey | translate }}</span>
        </a>
      </nav>

      <div class="admin-sidebar-footer">
        <button class="admin-nav-link admin-nav-btn" type="button" (click)="onLogout()">
          <span class="material-symbols-outlined">logout</span>
          <span>{{ 'STAFF.LAYOUT.SIGN_OUT' | translate }}</span>
        </button>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <button
        type="button"
        class="admin-icon-btn admin-menu-toggle"
        (click)="toggleSidebar()"
        [attr.aria-expanded]="isSidebarOpen"
        [attr.aria-label]="(isSidebarOpen ? 'STAFF.LAYOUT.CLOSE_MENU' : 'STAFF.LAYOUT.OPEN_MENU') | translate"
      >
        <span class="material-symbols-outlined">{{ isSidebarOpen ? 'close' : 'menu' }}</span>
      </button>

      <div class="admin-title-block">
        <h2>{{ pageTitleKey | translate }}</h2>
        <p>{{ pageSubtitleKey | translate }}</p>
      </div>

      <div class="admin-topbar-actions">
        <button
          type="button"
          class="admin-icon-btn"
          (click)="toggleTheme()"
          [attr.aria-pressed]="isDarkMode"
          [attr.aria-label]="'STAFF.LAYOUT.THEME_TOGGLE' | translate"
        >
          <span class="material-symbols-outlined">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
        </button>

        <app-lang-switcher></app-lang-switcher>

        <div class="admin-profile">
          <button
            class="admin-avatar"
            type="button"
            (click)="toggleProfileMenu()"
            [attr.aria-expanded]="isProfileMenuOpen"
            aria-haspopup="menu"
            [attr.aria-label]="'STAFF.LAYOUT.PROFILE_MENU' | translate"
          >
            {{ userInitials }}
          </button>
          <div class="admin-profile-menu" *ngIf="isProfileMenuOpen" role="menu">
            <a
              *ngIf="isAdmin"
              routerLink="/admin/dashboard"
              class="admin-profile-item"
              role="menuitem"
              (click)="closeProfileMenu()"
            >
              <span class="material-symbols-outlined">admin_panel_settings</span>
              <span>{{ 'STAFF.LAYOUT.ADMIN_DASHBOARD' | translate }}</span>
            </a>
            <button type="button" class="admin-profile-item" role="menuitem" (click)="onLogout()">
              <span class="material-symbols-outlined">logout</span>
              <span>{{ 'STAFF.LAYOUT.SIGN_OUT' | translate }}</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
