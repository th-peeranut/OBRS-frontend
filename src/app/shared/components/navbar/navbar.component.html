<div class="navbar-container">
  <!-- logo (navigates to home) -->
  <a class="logo" routerLink="/home">
    <img class="logo" src="images/logo.svg" alt="Logo" />
  </a>

  <!-- วิธีจองและชำระเงิน -->
  <a
    class="menu-font"
    routerLink="/how-to-book"
    routerLinkActive="menu-font-active"
  >
    {{ "HOME.NAVBAR.BOOKING" | translate }}
  </a>
  <!-- ติดต่อเรา -->
  <button
    type="button"
    class="menu-font menu-font-action"
    (click)="scrollToContact()"
  >
    {{ "HOME.NAVBAR.CONTACT" | translate }}
  </button>

  <div class="button-container">
    <!-- Language globe dropdown -->
    <div class="navbar-lang-dropdown">
      <button
        #langDropdown
        type="button"
        class="navbar-lang-trigger"
        (click)="toggleLangDropdown()"
        [attr.aria-expanded]="isLangDropdownOpen"
        aria-haspopup="menu"
        [attr.aria-label]="'HOME.NAVBAR.LANGUAGE_SWITCH' | translate"
      >
        <span class="material-symbols-outlined navbar-lang-globe">language</span>
        <span class="navbar-lang-label">{{ currentEndonym }}</span>
        <span class="material-symbols-outlined navbar-lang-chevron">expand_more</span>
      </button>

      <div
        class="navbar-lang-menu"
        *ngIf="isLangDropdownOpen"
        role="menu"
      >
        <button
          *ngFor="let lang of languages"
          type="button"
          class="navbar-lang-item"
          [class.active]="currentLanguage === lang.code"
          role="menuitemradio"
          [attr.aria-checked]="currentLanguage === lang.code"
          [attr.aria-current]="currentLanguage === lang.code ? 'true' : null"
          [attr.aria-label]="lang.ariaKey | translate"
          (click)="selectLanguage(lang.code)"
        >
          <span
            class="material-symbols-outlined navbar-lang-check"
            [class.visible]="currentLanguage === lang.code"
            aria-hidden="true"
          >check</span>
          <span>{{ lang.endonym }}</span>
        </button>
      </div>
    </div>

    <ng-container *ngIf="!isLogin">
      <!-- เข้าสู่ระบบ -->
      <button class="btn btn-signin" type="button" [routerLink]="'/login'">
        {{ "HOME.NAVBAR.SIGNIN" | translate }}
      </button>

      <!-- สมัครสมาชิก -->
      <button class="btn btn-signup" type="button" [routerLink]="'/register'">
        {{ "HOME.NAVBAR.SIGNUP" | translate }}
      </button>
    </ng-container>

    <ng-container *ngIf="isLogin">
      <!-- PROFILE AVATAR DROPDOWN -->
      <div class="navbar-profile">
        <button
          #profileDropdown
          class="navbar-avatar"
          type="button"
          (click)="toggleProfileDropdown()"
          [attr.aria-expanded]="isProfileDropdownOpen"
          aria-haspopup="menu"
          [attr.aria-label]="'HOME.NAVBAR.PROFILE_MENU' | translate"
        >
          {{ userInitials }}
        </button>
        <div class="navbar-profile-menu" *ngIf="isProfileDropdownOpen" role="menu">
          <a
            *ngIf="isAdmin"
            class="navbar-profile-item"
            role="menuitem"
            [routerLink]="'/admin/dashboard'"
            (click)="isProfileDropdownOpen = false"
          >
            <span class="material-symbols-outlined">dashboard</span>
            <span>{{ "HOME.NAVBAR.ADMIN_DASHBOARD" | translate }}</span>
          </a>
          <a
            *ngIf="isSalesperson || isDriver"
            class="navbar-profile-item"
            role="menuitem"
            [routerLink]="'/staff'"
            (click)="isProfileDropdownOpen = false"
          >
            <span class="material-symbols-outlined">badge</span>
            <span>{{ "HOME.NAVBAR.STAFF_PORTAL" | translate }}</span>
          </a>
          <button
            type="button"
            class="navbar-profile-item"
            role="menuitem"
            (click)="onLogout()"
          >
            <span class="material-symbols-outlined">logout</span>
            <span>{{ "HOME.NAVBAR.SIGNOUT" | translate }}</span>
          </button>
        </div>
      </div>
    </ng-container>
  </div>
</div>
